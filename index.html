<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIFA World Cup 2026 - Vibrant History & Bracket</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* --- GLOBAL: Hide Page Scrollbars --- */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            color: #e0e0e0;
        }

        html::-webkit-scrollbar, 
        body::-webkit-scrollbar {
            display: none;
            width: 0;
            background: transparent;
        }

        /* --- BRACKET CONTAINERS (NEW) --- */
        .bracket-container {
            position: fixed;
            top: 98px; /* Below timeline */
            bottom: 0;
            width: auto; /* Slightly wider than match card (200px) + padding */
            background: rgba(15, 15, 15, 0.4);
            backdrop-filter: blur(8px);
            z-index: 1500; /* Above map, below timeline controls */
            display: flex;
            flex-direction: column;
            gap: 1px;
            padding: 1px px;
            overflow-y: auto;
            scrollbar-width: none;
            transition: opacity 0.3s ease;
            /* --- BRACKET AUTO-HIDE LOGIC --- */
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease;
            opacity: 0; /* Hidden by default */    
        }

        .bracket-container::-webkit-scrollbar {
            display: none;
        }

        #bracket-left {
            left: 0;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateX(-90%);
        }

        #bracket-right {
            right: 0;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateX(90%); 
        }
                /* Show on Hover */
        #bracket-left:hover, 
        #bracket-right:hover,
        .bracket-container.force-show {
            transform: translateX(0);
            opacity: 1;
        }

        /* Optional: Small "tab" visible when hidden to indicate content exists */
        .bracket-container::after {
            content: '⚽'; /* Or an arrow icon */
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 215, 0, 0.2);
            padding: 10px 5px;
            border-radius: 4px;
            font-size: 1.2rem;
            pointer-events: none;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        #bracket-left::after { right: -25px; }
        #bracket-right::after { left: -25px; }

        /* Hide the tab when bracket is open */
        .bracket-container:hover::after,
        .bracket-container.force-show::after {
            opacity: 0;
        }
                /* --- PINNED STATE --- */
        .bracket-container.pinned {
            transform: translateX(0) !important;
            opacity: 1 !important;
            z-index: 1600; /* Ensure it stays above map even when not hovering */
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* Optional: Visual cue */
            border-color: rgba(255, 215, 0, 0.3); /* Optional: Gold border */
        }

        /* Keep the tab hidden when pinned */
        .bracket-container.pinned::after {
            opacity: 0;
        }   

        /* Hide brackets on small screens to prevent map obstruction */
        @media (max-width: 1000px) {
            .bracket-container {
                display: none;
            }
        }

        /* --- STAGE CARD (Grouping matches by round) --- */
        .stage-card {
            background: rgba(30, 30, 30, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stage-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #FFD700;
            text-align: center;
            margin-bottom: 4px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            padding-bottom: 4px;
        }

        /* --- MATCH CARD (Shared Styles for Timeline & Bracket) ---        background: radial-gradient(    400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),     rgba(72, 152, 218, 0.4),     transparent 40%  ); */
        .match-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 200px;
            height: 70px; /* Slightly shorter for bracket */
            background: rgba(34, 34, 34, 0.6);
            border: 1px solid rgba(60, 60, 60, 0.5);
            border-radius: 6px;
            padding: 4px 8px;
            box-sizing: border-box;
            position: relative;
            transition: all 0.2s ease;
            flex-shrink: 0;
            cursor: pointer;
        }

        /* Timeline Specific Overrides */
        #timeline-track .match-card {
            height: 80px;
            width: 200px;
        }

        .match-card:hover {
            background: rgba(42, 42, 42, 0.8);
            border-color: #888;
            transform: translateY(-2px);
            z-index: 11;
        }

        .match-card.active {
            border-color: #ff3b30;
            background: rgba(42, 42, 42, 0.9);
            box-shadow: 0 0 100px rgba(255, 59, 48, 0.1), 0 0 90px rgba(255, 59, 48, 0.3), 0 0 70px rgba(255, 59, 48, 0.7), 0 0 5px rgb(255, 13, 0, 9);
            z-index: 10;
        }

        /* Card Internal Layout */
        .card-top {
            display: flex;
            justify-content: space-between;
            font-size: 0.5rem;
            color: #9d9d9d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            font-weight: 600;
        }

        .card-top .status-live { color: #ff7870; animation: pulse 2.5s infinite; font-size: 0.9rem; }
        .card-top .status-finished { color: #73ff78;  }
        .card-top .status-scheduled { color: #6dbdff; font-size: 0.5rem;font-weight: bold;}
        .card-top .status-today { 
                                color: #a9d8ff;  
                                font-weight: bolder; 
                                font-size: 0.575rem; 
                                text-shadow: 0 0 2px rgba(72, 152, 218, 0.9),   /* Tight core */
                                0 0 4px rgba(72, 152, 218, 0.7),   /* Mid glow */
                                0 0 6px rgba(72, 152, 218, 0.5); } /* Soft outer haze */  /* Optional: Make the text itself slightly brighter to enhance the glow color: #fff;*/  

        .card-top .status-tomorrow { 
                                color: #a9d8ff; opacity: 1;font-weight: bold; 
                                font-size: 0.5rem;
                                text-shadow: 0 0 2px rgba(72, 152, 218, 0.1), 
                                0 0 4px rgba(72, 152, 218, 0.1);}

        .card-middle {
                        display: flex;
                        align-items: center;
                        justify-content: space-between;
                        flex-grow: 1;
                        font-weight: 700;
                        color: #eee;
                        font-size: 0.65rem;}

        .team-box {
            display: flex;
            align-items: center;
            gap: 3px;
            flex: 1;
            overflow: hidden;
        }

        .team-box.right { justify-content: flex-end; text-align: right; }

        .team-flag {
            width: 14px;
            height: 10px;
            object-fit: cover;
            border-radius: 2px;
            background: #444;
            flex-shrink: 0;
        }

        .score-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 0 4px;
            font-family: 'Courier New', monospace;
            font-weight: 800;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

         /* --- Penalty Score Styles --- */
        .pen-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
            margin-top: 2px;
        }

        .pen-num {
            font-family: 'Courier New', monospace;
            font-weight: 800;
            font-size: 0.65rem; /* Smaller than main score */
            display: block;
        }

        .pen-big { font-size: 0.95rem; color: #b6fca7; } /* Winner */
        .pen-tie { font-size: 1.1rem; color: #ffffff; } /* Tie */
        .pen-small { font-size: 0.8rem; color: #F5D2D2; } /* Loser */   

        .score-big { font-size: 1.325rem; color: #CAEEC2; }
        .score-tie { font-size: 1.3rem; color: #ffffff; }
        .score-small { font-size: 1.2125rem; color: #F5D2D2; }

        .card-bottom {
            font-size: 0.45rem;
            color: #9d9d9d;
            text-align: center;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- TIMELINE: Ensure it's ALWAYS on top --- */
        #timeline-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 98px;
            background: rgba(15, 15, 15, 0.95);
            border-bottom: 1px solid #111;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            z-index: 2000 !important;
            scrollbar-width: none;
            -ms-overflow-style: none;
            box-shadow: 0 0.5px 1px #111;
        }

        #timeline-wrapper::-webkit-scrollbar {
            display: none;
            width: 0;
            background: transparent;
        }

        #timeline-track {
            display: inline-flex;
            align-items: center;
            padding: 0 50vw;
            gap: 12px;
            height: 100%;
            opacity: 0.75;
            backdrop-filter: blur(12px);
        }

        /* --- MAP: Ensure it stays BELOW --- */
        #map {
            position: absolute;
            top: 98px;
            left: 0;
            width: 100%;
            height: calc(100vh - 98px);
            z-index: 1 !important;
            background: #111;
        }

        .leaflet-container { background: #111; z-index: 1 !important; }
        .leaflet-pane { z-index: 1 !important; }
        .leaflet-top, .leaflet-bottom { z-index: 2 !important; }
        .leaflet-popup-pane { z-index: 3 !important; }

        /* --- CENTER MARKER --- */
        #timeline-center-marker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 15px;
            
            background: #ff3b30;
            opacity: 0.75;
            backdrop-filter: blur(12px);
            z-index: 3000 !important;
            pointer-events: all;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.6);
        }

        /* --- YEAR FILTER --- */
        #year-filter-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            padding: 20px 40px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            overflow: hidden;
            min-width: 300px;
        }

        .year-option {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 800;
            color: #555;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
            white-space: nowrap;
            will-change: transform, color, opacity;
            cursor: pointer;
        }

        .year-option.accented { color: #fff !important; z-index: 10; }

        #reset-hint {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #year-filter-container:hover #reset-hint { opacity: 1; }

        /* --- TOOLTIP --- */
        #map-tooltip {
            position: absolute;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -150%);
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 2000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: left;
            min-width: 120px;
        }

        #map-tooltip.visible { opacity: 1; transform: translate(-50%, -140%); }
        #map-tooltip .tt-title { font-size: 0.85rem; font-weight: 700; color: #fff; margin-bottom: 4px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px; }
        #map-tooltip .tt-row { font-size: 0.75rem; color: #ddd; margin: 2px 0; display: flex; justify-content: space-between; gap: 15px; }
        #map-tooltip .tt-label { color: #888; font-weight: 500; }
        #map-tooltip .tt-value { color: #fff; font-weight: 600; text-align: right; }

        /* --- STADIUM POPUP --- */
        .leaflet-tooltip.stadium-tooltip {
            background: rgba(20, 20, 20, 0.95) !important;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.3) !important;
            border-radius: 8px;
            padding: 0 !important;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
            transition: opacity 0.2s ease;
            max-width: 250px !important;
        }
                /* Target the popup container with your custom class */
        .stadium-tooltip .leaflet-popup-content-wrapper {
            background: rgba(20, 20, 20, 0.95) !important;
            backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 215, 0, 0.3) !important;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 10px; /* Reset padding here, not on the outer container */
                   
            /* Flip the popup tip to point DOWN instead of UP */        
            transform: translate(120px, 50%);
            top: auto; /* Adjust based on your offset */
            bottom: auto;
        }

        /* Target the little triangle tip of the popup */
        .stadium-tooltip .leaflet-popup-tip {
            background: rgba(20, 20, 20, 0.95) !important;
            border-top: 1px solid rgba(255, 215, 0, 0.3); /* Optional: style tip border */
        }

        /* Optional: Remove default max-width constraints if needed */
        .stadium-tooltip .leaflet-popup-content {
            max-width: 250px;
            margin: 0;
            line-height: 1.4;
        }   
        .stadium-popup-content { text-align: center; min-width: 200px; padding: 12px 16px; }
        .stadium-name { font-weight: 700; font-size: 1.1rem; color: #FFD700; margin-bottom: 4px; }
        .stadium-city { font-size: 0.85rem; color: #ccc; margin-bottom: 6px; }
        .stadium-capacity { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .stadium-matches-header { font-size: 0.7rem; color: #FFD700; text-transform: uppercase; border-top: 1px solid #444; border-bottom: 1px solid #444; padding: 6px 0; margin: 8px 0; font-weight: 700; }
        .stadium-match-list { max-height: 150px; overflow-y: auto; text-align: left; scrollbar-width: thin; scrollbar-color: #555 #222; }
        .stadium-match-item { border-bottom: 1px solid #333; padding: 6px 0; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stadium-match-meta { color: #888; font-size: 0.65rem; flex-shrink: 0; }
        .stadium-match-teams { color: #fff; line-height: 1.3; flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; }
        .stadium-match-score { color: #8cb889; font-weight: 700; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<!-- UI Elements -->
<div id="timeline-center-marker" title="Jump to Current Time"></div>

<!-- Timeline Container -->
<div id="timeline-wrapper">
    <div id="timeline-track"></div>
</div>

<!-- Bracket Containers (NEW) -->
<div id="bracket-left" class="bracket-container">
    <!-- Injected via JS -->
</div>
<div id="bracket-right" class="bracket-container">
    <!-- Injected via JS -->
</div>

<!-- Map -->
<div id="map"></div>
<div id="map-tooltip"></div>

<!-- Year Filter -->
<div id="year-filter-container" title="Scroll to change year, Click to reset">
    <div id="reset-hint">Click to reset</div>
</div>

<!-- Data Scripts -->
<script src="venues.js"></script>
<script src="FWCD_Participants.js"></script>

<script>
// ==========================================
// 1. GLOBAL CONFIG & STATE
// ==========================================
const DATA_URL = 'https://raw.githubusercontent.com/26worldcup/26worldcup.github.io/main/public/data/matches.json';
const timelineWrapper = document.getElementById('timeline-wrapper');
const timelineTrack = document.getElementById('timeline-track');
const centerMarker = document.getElementById('timeline-center-marker');
const bracketLeft = document.getElementById('bracket-left');
const bracketRight = document.getElementById('bracket-right');

let matchesCache = null;
let venuesMap = {};
let lastFetchTime = 0;
const CACHE_DURATION = 30000;

// Map & D3 Globals
let allNodes = [], allLinks = [], uniqueYears = [], selectedYear = null, currentYearIndex = -1, yearColorMap = {};
let renderNodes = [], renderLinks = [];
const map = L.map('map', { worldCopyJump: false, noWrap: false, zoomControl: false }).setView([20, 0], 2);

// Country Code Mapping
const country3to2 = {
  'AUS': 'AU', 'IRN': 'IR', 'IRQ': 'IQ', 'JPN': 'JP', 'JOR': 'JO', 'KOR': 'KR', 'KSA': 'SA', 'UZB': 'UZ',
  'ALG': 'DZ', 'CPV': 'CV', 'COD': 'CD', 'CIV': 'CI', 'EGY': 'EG', 'GHA': 'GH', 'MAR': 'MA', 'SEN': 'SN', 'RSA': 'ZA', 'TUN': 'TN',
  'CAN': 'CA', 'CUW': 'CW', 'HAI': 'HT', 'MEX': 'MX', 'PAN': 'PA', 'USA': 'US',
  'ARG': 'AR', 'BRA': 'BR', 'COL': 'CO', 'ECU': 'EC', 'PAR': 'PY', 'URU': 'UY',
  'NZL': 'NZ',
  'AUT': 'AT', 'BEL': 'BE', 'BIH': 'BA', 'CRO': 'HR', 'CZE': 'CZ', 'ENG': 'GB', 'FRA': 'FR', 'GER': 'DE', 'NED': 'NL', 'NOR': 'NO',
  'POR': 'PT', 'SCO': 'GB', 'ESP': 'ES', 'SWE': 'SE', 'SUI': 'CH', 'TUR': 'TR'
};

// ==========================================
// 2. UTILITIES
// ==========================================
const getFlagUrl = (codeOrName) => {
  if (!codeOrName) return 'https://flagcdn.com/w40/xx.png';
  if (codeOrName.length === 2) return `https://flagcdn.com/w40/${codeOrName.toLowerCase()}.png`;
  const code2 = country3to2[codeOrName.toUpperCase()];
  if (code2) return `https://flagcdn.com/w40/${code2.toLowerCase()}.png`;
  const nameMap = { 'USA': 'us', 'Mexico': 'mx', 'Canada': 'ca', 'Brazil': 'br', 'Germany': 'de', 'France': 'fr', 'Argentina': 'ar', 'England': 'gb-eng', 'Spain': 'es', 'Italy': 'it', 'Netherlands': 'nl', 'Portugal': 'pt', 'Belgium': 'be', 'Croatia': 'hr', 'Morocco': 'ma', 'Japan': 'jp', 'South Korea': 'kr', 'Australia': 'au', 'Switzerland': 'ch', 'Denmark': 'dk', 'Serbia': 'rs', 'Poland': 'pl', 'Uruguay': 'uy', 'Ecuador': 'ec', 'Senegal': 'sn', 'Qatar': 'qa', 'Saudi Arabia': 'sa', 'Iran': 'ir', 'Tunisia': 'tn', 'Cameroon': 'cm', 'Ghana': 'gh', 'Costa Rica': 'cr', 'Wales': 'gb-wls', 'DR Congo': 'cd', 'Cape Verde': 'cv', 'Algeria': 'dz', 'Austria': 'at', 'Czechia': 'cz', 'Scotland': 'gb-sct', 'Haiti': 'ht', 'Curaçao': 'cw', 'Panama': 'pa', 'New Zealand': 'nz', 'Iraq': 'iq', 'Jordan': 'jo', 'Uzbekistan': 'uz', 'Turkey': 'tr', 'Bosnia and Herzegovina': 'ba', 'Norway': 'no', 'Sweden': 'se', 'South Africa': 'za', 'Egypt': 'eg', 'Colombia': 'co', 'Chile': 'cl' };
  return `https://flagcdn.com/w40/${nameMap[codeOrName] || 'xx'}.png`;
};

function initVenues() {
  if (typeof venuesData !== 'undefined' && venuesData.venues) {
    venuesMap = venuesData.venues;
    return true;
  }
  return false;
}

function getVenueDetails(venueId) {
  if (!venueId || !venuesMap[venueId]) return { realName: 'TBD', city: 'TBD', note: 'TBD' };
  const venue = venuesMap[venueId];
  return { realName: venue.realName || 'Unknown Stadium', city: venue.city || 'Unknown City', note: venue.note || 'Unknown info' };
}

function getLocalTime(utcString) {
  const date = new Date(utcString);
  return date.toLocaleTimeString([], {month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// ==========================================
// 3. DATA FETCHING
// ==========================================
async function fetchMatches() {
  const now = Date.now();
  if (matchesCache && (now - lastFetchTime) < CACHE_DURATION) return matchesCache;

  try {
    const response = await fetch(`${DATA_URL}?t=${now}`);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const data = await response.json();
    let finalData = data;
    if (Array.isArray(data)) finalData = data;
    else if (data.matches && Array.isArray(data.matches)) finalData = data.matches;
    else if (data.data && Array.isArray(data.data)) finalData = data.data;
    else {
      const key = Object.keys(data).find(k => Array.isArray(data[k]));
      if (key) finalData = data[key];
    }
    matchesCache = finalData;
    lastFetchTime = now;
    return finalData;
  } catch (error) {
    console.error('Failed to fetch matches:', error);
    return matchesCache || [];
  }
}

// ==========================================
// 4. MATCH CARD GENERATION (SHARED)
// ==========================================
function createMatchCardHTML(match) {
            const isFinished = match.status === 'finished';
            const isLive = match.status === 'live';
            const isScheduled = match.status === 'scheduled';

        
            // Handle Nulls explicitly as requested
            const homeTeam = match.home ? (match.home.name || match.home.code || 'null') : (match.team1 || 'null');
            const awayTeam = match.away ? (match.away.name || match.away.code || 'null') : (match.team2 || 'null');
            const homeCode = match.home ? (match.home.code || '') : '';
            const awayCode = match.away ? (match.away.code || '') : '';
            const homeScore = match.home ? match.home.score : (match.score1 !== undefined ? match.score1 : null);
            const awayScore = match.away ? match.away.score : (match.score2 !== undefined ? match.score2 : null);
            // --- NEW: Get Penalty Scores ---
            const homePen = match.home ? (match.home.pen || match.home.penalties) : (match.pen1 !== undefined ? match.pen1 : null);
            const awayPen = match.away ? (match.away.pen || match.away.penalties) : (match.pen2 !== undefined ? match.pen2 : null);

        
            const venueId = match.venueId || match.venue;
            const venueDetails = getVenueDetails(venueId);
            const stadiumText = `${venueDetails.realName}, ${venueDetails.city}, ${venueDetails.note}`;

            let statusText, statusClass;

            // --- CONFIG: Estimated Stoppage Time Buffers (in minutes) ---
            // Based on 2026 FIFA averages (Collina's stricter time-wasting rules)
            const EST_STOPPAGE_1H = 4;  // Average 3-6 mins added to 1st Half
            const EST_STOPPAGE_2H = 6;  // Average 4-10 mins added to 2nd Half
            const HALFTIME_BREAK = 30;
            const EXTRA_TIME_BREAK = 8;
            const HYDRATION_TIME_BREAK = 3;

                // --- CRITICAL FIX: FORCE LIVE IF DATE PASSED ---
                // If status is 'scheduled' BUT the kickoff date is in the past, treat as LIVE
                let forceLive = false;
                if (isScheduled) {
                    const startDate = new Date(match.date);
                    const now = new Date();
                    if (now > startDate) {
                        forceLive = true;
                        console.log(`Force LIVE for match ${match.id} (Status stuck: ${match.status})`);
                    }
                }

    if (isFinished) {
            // --- FINISHED: Use API 'time' for exact stoppage display ---
            if (match.time && typeof match.time === 'string' && match.time.trim() !== '') {
                const totalMinutes = parseInt(match.time.replace("'", ""), 10);
                if (!isNaN(totalMinutes)) {
                if (totalMinutes > 125 && homePen !== null && awayPen !== null) statusText = `FT +${totalMinutes - 90}' ET|PK`;
                else if (totalMinutes > 105) statusText = `AET +${totalMinutes - 90}'`;
                else if (totalMinutes > 90) statusText = `FT +${totalMinutes - 90}'`;
                else if (totalMinutes > 45 && totalMinutes <= 60) statusText = `HT`;
                else statusText = 'FT';
                } else {
                statusText = 'FT';
                }
            } else {
                statusText = 'FT';
            }
            statusClass = 'status-finished';

            } 
    else if (isLive || forceLive) {
            // --- LIVE: CALCULATE FROM KICKOFF (With Stoppage Buffers) ---
            const startDate = new Date(match.date);
            const now = new Date();
            let elapsedTotal = Math.floor((now - startDate) / 60000);

            let matchClock = 0;
            let phase = '';

            let isFinished = false; // Flag to indicate match is over

        // --- MAX DURATION CAP ---
        // 90 (reg) + 15 (HT) + 30 (ET) + 5 (ET Break) + 12 (Total Stoppage) + 5 (Buffer) = ~162 mins
        const MAX_MATCH_DURATION = 90 + HALFTIME_BREAK + 30 + EXTRA_TIME_BREAK + EST_STOPPAGE_1H + EST_STOPPAGE_2H + 10;

        if (elapsedTotal > MAX_MATCH_DURATION) {
            // --- MATCH FINISHED: STOP CALCULATION ---
            // Do not calculate matchClock. Let the repo update handle the specific "FT", "AET", "Pens"
            isFinished = true;
            statusText = "FT"; // Temporary placeholder, will be overwritten by repo data
            statusClass = 'status-finished';
        } 
    else {
            // --- LIVE CALCULATION LOGIC ---

            // Phase 1: First Half + Stoppage
            if (elapsedTotal < 45 + EST_STOPPAGE_1H + 2) { 
                matchClock = elapsedTotal;
                phase = '1H';
            } 
            // Phase 2: Halftime Break
            else if (elapsedTotal >= 45 + EST_STOPPAGE_1H && elapsedTotal < 60 + EST_STOPPAGE_1H) {
                statusText = "HT";
                statusClass = 'status-live';
            } 
            // Phase 3: Second Half + Stoppage
            else if (elapsedTotal >= 60 + EST_STOPPAGE_1H && elapsedTotal < 105 + EST_STOPPAGE_1H + EST_STOPPAGE_2H + 5) {
                matchClock = elapsedTotal - HALFTIME_BREAK + EST_STOPPAGE_1H;
                phase = '2H';
            } 
            // Phase 4: Extra Time Break
            else if (elapsedTotal >= 105 + EST_STOPPAGE_1H + EST_STOPPAGE_2H && elapsedTotal < 110 + EST_STOPPAGE_1H + EST_STOPPAGE_2H) {
                statusText = "ET Break";
                statusClass = 'status-live';
            } 
            // Phase 5: Extra Time
            else if (elapsedTotal >= 110 + EST_STOPPAGE_1H + EST_STOPPAGE_2H) {
                matchClock = elapsedTotal - HALFTIME_BREAK - EXTRA_TIME_BREAK + 3;
                let etMinute = matchClock - 90;
                if (etMinute < 1) etMinute = 1;
                
                if (etMinute >= 15 && etMinute < 16) {
                    statusText = "ET HT";
                    statusClass = 'status-live';
                } else {
                    statusText = `ET ${etMinute}'`;
                    statusClass = 'status-live';
                }
            }

            // Format Standard Phases (1H, 2H)
            if (phase === '1H' || phase === '2H') {
                statusText = `${matchClock}'`;
                statusClass = 'status-live';
            }
            
            // Add LIVE prefix only if not a break or finished state
            if (statusText && !statusText.startsWith("HT") && !statusText.startsWith("ET") && !statusText.startsWith("Pens") && !isFinished) {
                statusText = "LIVE " + statusText;
            }
        }
    } 

    else {
            const matchDate = new Date(match.date); // Parses "2026-07-03T18:00:00Z" to local time
            const now = new Date();

            // 1. Normalize to Local Midnight for Comparison
            const today = new Date(now);
            today.setHours(0, 0, 0, 0);

            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            const matchDay = new Date(matchDate);
            matchDay.setHours(0, 0, 0, 0);

            // 2. Get Time String (IGNORE match.time as it is duration)
            // We strictly use the date object to get the scheduled local time
            let timeStr = "TBD";

            if (!isNaN(matchDate.getTime())) {
                // This extracts the local time (e.g., 2:00 PM) from the UTC timestamp
                timeStr = matchDate.toLocaleTimeString([], { 
                    hour: 'numeric', 
                    minute: '2-digit' 
                });
            }

            // 3. Compare Local Dates
            if (matchDay.getTime() === today.getTime()) {
                statusText = `Today, ${timeStr}`;
                statusClass = 'status-today';
            } 
            else if (matchDay.getTime() === tomorrow.getTime()) {
                statusText = `Tmrrw, ${timeStr}`;
                statusClass = 'status-tomorrow';
            } 
            else {
                const dateStr = matchDay.toLocaleDateString([], { 
                    month: 'short', 
                    day: 'numeric' 
                });
                statusText = `${dateStr}, ${timeStr}`;
                statusClass = 'status-scheduled';
            }         
    }       
    
 // 2. DETERMINE CLASSES (Add this after statusClass logic)
       if (isFinished && homePen !== null && awayPen !== null) {
        if (homePen > awayPen) { homePenClass = 'pen-big'; awayPenClass = 'pen-small'; }
        else if (awayPen > homePen) { homePenClass = 'pen-small'; awayPenClass = 'pen-big'; }
        else { homePenClass = 'pen-tie'; awayPenClass = 'pen-tie'; }
    }
    const stageName = match.stage === 'r32' ? 'Round of 32' : match.stage === 'qf' ? 'Quarter-Final' : match.stage === 'sf' ? 'Semi-Final' : match.stage === 'final' ? 'Final' : match.stage === '3rd' ? '3rd Place' : 'Group';
    
    let homeClass = 'score-small', awayClass = 'score-small';
    if (isFinished && homeScore !== null && awayScore !== null) {
      if (homeScore > awayScore) homeClass = 'score-big';
      else if (awayScore > homeScore) awayClass = 'score-big';
      else { homeClass = 'score-tie'; awayClass = 'score-tie'; }
    }
 // 3. Define Helper (Place before return)
const renderScoreBlock = (mainScore, penScore, penClass, mainClass) => {
    const mainDisplay = mainScore !== null ? mainScore : '-';
    const penDisplay = (penScore !== null && penScore !== undefined) 
        ? `<span class="pen-box"><span class="pen-num ${penClass}">${penScore}</span></span>` 
        : '<span style="height:0rem;"></span>'; // Invisible spacer to maintain height alignment

    return `<span style="display:flex; flex-direction:column; align-items:center; line-height:1;">
                <span class="${mainClass}">${mainDisplay}</span>
                ${penDisplay}
            </span>`;
};
    
    return `
      <div class="card-top">
        <span>#${match.n}</span>
        <span>${stageName}</span>
        <span class="${statusClass}">${statusText}</span>
      </div>
      <div class="card-middle">
        <div class="team-box">
          <img src="${getFlagUrl(homeCode || homeTeam)}" class="team-flag" alt="${homeTeam}">

    `;
}

function renderTimeline(matches) {
  timelineTrack.innerHTML = '';
  if (!matches || matches.length === 0) {
    timelineTrack.innerHTML = '<div style="color:#666; padding:20px;">No match data available</div>';
    return;
  }
  matches.sort((a, b) => new Date(a.date) - new Date(b.date));
  matches.forEach(match => {
    const card = document.createElement('div');
    card.className = 'match-card';
    card.id = `match-${match.n}`;
    card.dataset.date = match.date;
    card.innerHTML = createMatchCardHTML(match);
    card.addEventListener('click', () => scrollToMatch(card));
    timelineTrack.appendChild(card);
  });
  scrollToCurrentTime();
}

function scrollToMatch(cardElement) {
  const wrapper = document.getElementById('timeline-wrapper');
  const cardCenter = cardElement.offsetLeft + (cardElement.offsetWidth / 2);
  const wrapperCenter = wrapper.offsetWidth / 2;
  wrapper.scrollTo({ left: cardCenter - wrapperCenter, behavior: 'smooth' });
}

function scrollToCurrentTime() {
    if (!matchesCache) return;
    const now = new Date();
    const cards = document.querySelectorAll('#timeline-track .match-card');
    let liveCard = null, lastFinishedCard = null, nextUpcomingCard = null;

    cards.forEach(card => {
        card.classList.remove('active');
        const matchDate = new Date(card.dataset.date);
        const statusEl = card.querySelector('.card-top span:last-child');
        const isLive = statusEl && statusEl.classList.contains('status-live');
        if (isLive) liveCard = card;
        if (matchDate <= now) lastFinishedCard = card;
        else if (!nextUpcomingCard) nextUpcomingCard = card;
    });

    const activeCard = liveCard || lastFinishedCard || nextUpcomingCard;
    if (activeCard) {
        activeCard.classList.add('active');
        activeCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
}

svg.append('defs').append('filter').attr('id', 'glow-filter').attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%')
    .html(`<feGaussianBlur stdDeviation="8" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>`);
const g = svg.append('g').attr('class', 'leaflet-zoom-hide');

const successRadius = { "Champion": 18, "Final": 16, "Semi-Final": 14, "Quarter-Final": 10.85, "Round 16": 8.25, "Round 32": 6.5, "Group": 5, "Host": 21.25, "Host-Centenary": 10 };
const specialColors = { "Host": "#00FF00", "Host-Centenary": "#00FF00", "Champion": "#FFD700", "Final": "#C0C0C0", "Semi-Final": "#CD7F32", "Quarter-Final": "#FF6F92", "Round 32": "#FBCEFF" };
const yearColorScale = d3.scaleOrdinal().domain(d3.range(1930, 2030)).range(d3.quantize(d3.interpolateRainbow, 97));

function processData() {
    allNodes = []; allLinks = [];
    if (typeof fifaWorldCupParticipants === 'undefined') return;
    const byYear = d3.group(fifaWorldCupParticipants, d => d.year);
    uniqueYears = Array.from(byYear.keys()).sort();
    currentYearIndex = -1;

    byYear.forEach((participants, year) => {
        const hosts = participants.filter(p => p.Success === "Host");
        const vibrantColor = yearColorScale(year);
        yearColorMap[year] = vibrantColor;

        participants.forEach(p => {
            let r = successRadius[p.Success] || successRadius["Group"];
            let c = specialColors[p.Success] || vibrantColor;
            allNodes.push({ ...p, radius: r, color: c, yearColor: vibrantColor });

            if (hosts.length > 0 && p.Success !== "Host") {
                hosts.forEach(host => {
                    if (p.id !== host.id) {
                        allLinks.push({ source: host, target: p, year: year, color: vibrantColor });
                    }
                });
            }
        });
    });
    initYearFilter();
    filterAndDraw();
}

function initYearFilter() {
    const container = document.getElementById('year-filter-container');
    const hint = document.getElementById('reset-hint');
    container.innerHTML = ''; container.appendChild(hint);
    uniqueYears.forEach((year, index) => {
        const el = document.createElement('div');
        el.className = 'year-option';
        el.textContent = year;
        el.dataset.year = year;
        el.dataset.index = index;
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            if (selectedYear === year) resetFilter();
            else { currentYearIndex = index; selectedYear = year; updateFisheyeUI(); filterAndDraw(); }
        });
        container.insertBefore(el, hint);
    });
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.deltaY > 50) changeYear(1);
        else if (e.deltaY < -50) changeYear(-1);
    }, { passive: false });
    container.addEventListener('click', () => { if (selectedYear !== null) resetFilter(); });
    updateFisheyeUI();
}

function changeYear(direction) {
    let newIndex = currentYearIndex === -1 ? (direction > 0 ? 0 : uniqueYears.length - 1) : currentYearIndex + direction;
    if (newIndex < 0) newIndex = 0;
    if (newIndex >= uniqueYears.length) newIndex = uniqueYears.length - 1;
    if (newIndex !== currentYearIndex) {
        currentYearIndex = newIndex;
        selectedYear = uniqueYears[currentYearIndex];
        updateFisheyeUI();
        filterAndDraw();
    }
}

function resetFilter() { selectedYear = null; currentYearIndex = -1; updateFisheyeUI(); filterAndDraw(); }

function updateFisheyeUI() {
    const options = document.querySelectorAll('.year-option');
    if (currentYearIndex === -1) {
        options.forEach(opt => {
            opt.style.transform = 'scale(0.8)'; opt.style.fontSize = '0.9rem'; opt.style.opacity = '0.5';
            opt.style.color = '#555'; opt.style.textShadow = 'none'; opt.classList.remove('accented');
        });
        return;
    }
    options.forEach(opt => {
        const index = parseInt(opt.dataset.index);
        const year = opt.dataset.year;
        const distance = Math.abs(index - currentYearIndex);
        let scale, fontSize, opacity, color, shadow;
        if (distance === 0) {
            scale = 1.6; fontSize = '0.8rem'; opacity = 1; color = '#ffffff';
            shadow = `0 0 10px ${yearColorMap[year]}, 0 0 20px ${yearColorMap[year]}`;
            opt.classList.add('accented');
        } else if (distance === 1) { scale = 1; fontSize = '1.3rem'; opacity = 0.4; color = '#aaa'; shadow = 'none'; opt.classList.remove('accented'); }
        else if (distance === 2) { scale = 0.9; fontSize = '1rem'; opacity = 0.4; color = '#666'; shadow = 'none'; opt.classList.remove('accented'); }
        else { scale = 0.7; fontSize = '0.8rem'; opacity = 0.2; color = '#444'; shadow = 'none'; opt.classList.remove('accented'); }
        opt.style.transform = `scale(${scale})`; opt.style.fontSize = fontSize; opt.style.opacity = opacity;
        opt.style.color = color; opt.style.textShadow = shadow;
    });
}

function generateDynamicElements(nodes, links) {
    renderNodes = []; renderLinks = [];
    const worldWidthPixels = 256 * Math.pow(2, map.getZoom());
    const mapWidthPixels = map.getSize().x;
    const copiesNeeded = Math.ceil(mapWidthPixels / worldWidthPixels) + 2;
    for (let i = -copiesNeeded; i <= copiesNeeded; i++) {
        const lngOffset = i * 360;
        nodes.forEach(n => renderNodes.push({ ...n, lng: n.lng + lngOffset, worldCopyIndex: i }));
        links.forEach(l => renderLinks.push({ source: { ...l.source, lng: l.source.lng + lngOffset }, target: { ...l.target, lng: l.target.lng + lngOffset }, worldCopyIndex: i }));
    }
}

function draw() {
    const bounds = map.getBounds();
    const topLeft = map.latLngToLayerPoint(bounds.getNorthWest());
    const bottomRight = map.latLngToLayerPoint(bounds.getSouthEast());
    svg.attr('width', bottomRight.x - topLeft.x).attr('height', bottomRight.y - topLeft.y).style('left', topLeft.x + 'px').style('top', topLeft.y + 'px');
    g.attr('transform', `translate(${-topLeft.x},${-topLeft.y})`);

    g.selectAll('.host-line').data(renderLinks).join('path').attr('class', 'host-line')
        .attr('d', d => {
            const x1 = map.latLngToLayerPoint([d.source.lat, d.source.lng]).x;
            const y1 = map.latLngToLayerPoint([d.source.lat, d.source.lng]).y;
            const x2 = map.latLngToLayerPoint([d.target.lat, d.target.lng]).x;
            const y2 = map.latLngToLayerPoint([d.target.lat, d.target.lng]).y;
            return `M${x1},${y1} L${x2},${y2}`;
        })
        .attr('stroke', '#fff').attr('stroke-width', selectedYear ? 0.7 : 0.5).attr('stroke-opacity', selectedYear ? 0.8 : 0.4).attr('stroke-linecap', 'round');

    const tooltip = document.getElementById('map-tooltip');
    g.selectAll('circle').data(renderNodes).join('circle')
        .attr('cx', d => map.latLngToLayerPoint([d.lat, d.lng]).x)
        .attr('cy', d => map.latLngToLayerPoint([d.lat, d.lng]).y)
        .attr('r', d => d.radius)
        .attr('fill', d => d.color)
        .attr('fill-opacity', selectedYear ? 0.8 : 0.5)
        .attr('stroke', '#fff').attr('stroke-width', 1.125)
        .on('mouseover', function(event, d) {
            const allHostsForYear = allNodes.filter(n => n.year === d.year && n.Success === "Host");
            const hostNames = allHostsForYear.map(h => h.country).join(" & ") || "N/A";
            tooltip.innerHTML = `<div class="tt-title">${d.year} World Cup</div><div class="tt-row"><span class="tt-label">Host${allHostsForYear.length > 1 ? 's' : ''}:</span><span class="tt-value">${hostNames}</span></div><div class="tt-row"><span class="tt-label">Team:</span><span class="tt-value">${d.name}</span></div><div class="tt-row"><span class="tt-label">Result:</span><span class="tt-value">${d.Success}</span></div>`;
            tooltip.classList.add('visible');
            d3.select(this).attr('stroke', d.color).attr('stroke-width', 2).attr('fill-opacity', 1).attr('filter', 'url(#glow-filter)');
        })
        .on('mousemove', function(event) { tooltip.style.left = event.pageX + 'px'; tooltip.style.top = event.pageY + 'px'; })
        .on('mouseout', function() {
            tooltip.classList.remove('visible');
            d3.select(this).attr('stroke', '#fff').attr('stroke-width', 1.5).attr('fill-opacity', selectedYear ? 0.9 : 0.6).attr('filter', null);
        })
        .on('click', (e, d) => {
            L.popup().setLatLng([d.lat, d.lng]).setContent(`<strong>${d.name}</strong><br>Year: ${d.year}<br>Success: ${d.Success}`).openOn(map);
        });
}

function filterAndDraw() {
    let filteredNodes = allNodes, filteredLinks = allLinks;
    if (selectedYear !== null) {
        filteredNodes = allNodes.filter(n => n.year === selectedYear);
        filteredLinks = allLinks.filter(l => l.year === selectedYear);
    }
    generateDynamicElements(filteredNodes, filteredLinks);
    draw();
}

        function getMatchesForVenue(venueId, matches) {
            if (!matches || matches.length === 0) return '<div style="text-align:center; color:#888; padding:10px;">No matches</div>';
            const venueMatches = matches.filter(m => (m.venueId || m.venue) === venueId);
            if (venueMatches.length === 0) return '<div style="text-align:center; color:#888; padding:10px;">No matches</div>';
            venueMatches.sort((a, b) => new Date(a.date) - new Date(b.date));
            let html = '<div class="stadium-match-list">';
            venueMatches.forEach(m => {
            const dateObj = new Date(m.date);
            const dateStr = dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' });
            const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const homeName = m.home ? (m.home.name || m.home.code) : (m.team1 || 'null');
            const awayName = m.away ? (m.away.name || m.away.code) : (m.team2 || 'null');
            const homeScore = m.home ? m.home.score : (m.score1 !== undefined ? m.score1 : '-');
            const awayScore = m.away ? m.away.score : (m.score2 !== undefined ? m.score2 : '-');
            const isFinished = m.status === 'finished';
            const scoreDisplay = isFinished ? ` <span class="stadium-match-score">${homeScore}:${awayScore}</span>` : '';
            html += `<div class="stadium-match-item"><span class="stadium-match-meta">${dateStr}</span><span class="stadium-match-teams">${homeName}${scoreDisplay} vs ${awayName}</span><span class="stadium-match-meta">${timeStr}</span></div>`;
            });
            html += '</div>';
            return html;
        }

        // Calculate how many copies we need based on current zoom
        // Similar logic to your D3 generateDynamicElements
        const zoom = map.getZoom();
        const worldWidthPixels = 256 * Math.pow(2, zoom);
        const mapWidthPixels = map.getSize().x;
        const copiesNeeded = Math.ceil(mapWidthPixels / worldWidthPixels) + 2;

        Object.values(venuesMap).forEach(venue => {
            if (!venue.lat || !venue.lon) return;

            // Create markers for each world copy
            for (let i = -copiesNeeded; i <= copiesNeeded; i++) {
            const lngOffset = i * 360;
            const marker = L.marker([venue.lat, venue.lon + lngOffset], { icon: stadiumIcon });

            // Only bind popup to the "original" marker (i=0) to avoid duplicates
            // Or bind to all if you want popups on every copy (requires careful handling)
            //if (i === 0) {
                const matchListHtml = getMatchesForVenue(venue.id, matchesCache);
                const popupContent = `<div class="stadium-popup-content"><div class="stadium-name">${venue.realName || venue.name}</div><div class="stadium-city">${venue.city}</div><div class="stadium-capacity">Cap: ${venue.capacity ? venue.capacity.toLocaleString() : 'N/A'}</div><div class="stadium-matches-header">Matches</div>${matchListHtml}</div><div class="stadium-info">${venue.note}</div>`;
                
                marker.bindPopup(popupContent, { 
                className: 'stadium-tooltip', 
                closeButton: false,
                direction: 'auto',
                maxWidth: 250, 
                minWidth: 200, 
                autoClose: true, 
                closeOnClick: true, 
                            // 1. STOP MAP MOVEMENT
                autoPan: false, 
                    
                    // 2. FORCE POPUP TO OPEN BELOW
                    // Positive Y value pushes the popup DOWN relative to the marker
                    offset: [0, 10] 
                });
                
            // marker.on('mouseover', function() { this.openPopup(); });
            // marker.on('mouseout', function() { this.closePopup(); });
                    // --- Inside addStadiumMarkers loop ---

                let hoverTimer = null; // Variable to store the timer

                // 1. Clear timer on mouseout (cancel the popup if we leave quickly)
            /* marker.on('mouseout', function() {
                    if (hoverTimer) {
                        clearTimeout(hoverTimer);
                        hoverTimer = null;
                    }
                    this.closePopup();
                });*/

                // 2. Set timer on mouseover (wait 300ms before opening)
                marker.on('mouseover', function() {
                    const markerRef = this; // Capture 'this' context
                    
                    // Clear any existing timer (prevents double-firing)
                    if (hoverTimer) clearTimeout(hoverTimer);
                    
                    // Start new timer
                    hoverTimer = setTimeout(() => {
                        markerRef.openPopup();
                    }, 50); // 300ms delay (adjust as needed)
                });   
           // }
            
            marker.addTo(map);
            }
        });
}   

// ==========================================
// 8.1 BRACKET AUTO HIDE/PIN
// ==========================================

    // --- BRACKET AUTO-HIDE LOGIC ---
    const BRACKET_EDGE_THRESHOLD = 50; // Pixels from edge to trigger show

    document.addEventListener('mousemove', (e) => {
        const leftBracket = document.getElementById('bracket-left');
        const rightBracket = document.getElementById('bracket-right');
        
        // Check Left Edge
        if (e.clientX < BRACKET_EDGE_THRESHOLD) {
            leftBracket.classList.add('force-show');
        } else if (e.clientX > window.innerWidth - BRACKET_EDGE_THRESHOLD) {
            // Check Right Edge
            rightBracket.classList.add('force-show');
        } else {
            // Mouse is in the middle, remove force-show (let CSS hover handle it)
            leftBracket.classList.remove('force-show');
            rightBracket.classList.remove('force-show');
        }
    });

    // Optional: Keep brackets visible on touch devices (since they can't "hover")
    if ('ontouchstart' in window) {
        document.querySelectorAll('.bracket-container').forEach(el => {
            el.classList.add('force-show');
        });
    }   
    // --- BRACKET PIN LOGIC ---
    const leftBracket = document.getElementById('bracket-left');
    const rightBracket = document.getElementById('bracket-right');

    function togglePin(e, element) {
        e.stopPropagation(); // Prevent map click events
        element.classList.toggle('pinned');
        
        // Optional: Visual feedback (e.g., console log or icon change)
        console.log(`${element.id} ${element.classList.contains('pinned') ? 'Pinned' : 'Unpinned'}`);
    }

    leftBracket.addEventListener('click', (e) => togglePin(e, leftBracket));
    rightBracket.addEventListener('click', (e) => togglePin(e, rightBracket));

    // Update Edge Detection to respect Pin
    document.addEventListener('mousemove', (e) => {
        // Only auto-show if NOT pinned (pinned stays shown via CSS)
        if (!leftBracket.classList.contains('pinned') && e.clientX < 50) {
            leftBracket.classList.add('force-show');
        } else if (!leftBracket.classList.contains('pinned')) {
            leftBracket.classList.remove('force-show');
        }

        if (!rightBracket.classList.contains('pinned') && e.clientX > window.innerWidth - 50) {
            rightBracket.classList.add('force-show');
        } else if (!rightBracket.classList.contains('pinned')) {
            rightBracket.classList.remove('force-show');
        }
    });   


// ==========================================
// 9. INITIALIZATION
// ==========================================
async function initTimeline() {
  if (!initVenues()) { console.error('Venues data missing.'); return; }
  const matches = await fetchMatches();
  renderTimeline(matches);
  renderBrackets(); // Render Brackets
  addStadiumMarkers();
  setTimeout(scrollToCurrentTime, 100);
  
  setInterval(async () => {
    await fetchMatches();
    renderTimeline(matchesCache);
    renderBrackets(); // Re-render Brackets on refresh
    scrollToCurrentTime();
  }, 60000);
}

centerMarker.addEventListener('click', () => {
  fetchMatches().then(() => { renderTimeline(matchesCache); renderBrackets(); scrollToCurrentTime(); });
});

timelineWrapper.addEventListener('wheel', (evt) => {
  evt.preventDefault();
  timelineWrapper.scrollLeft += evt.deltaY;
});

map.on('zoomend', () => filterAndDraw());
map.on('moveend', draw);






// Start
processData();
initTimeline();

</script>
